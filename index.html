<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, query, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyD1GnYInbXZHxjX91E25ki2WP-R0a9pWTU",
        authDomain: "gold-savings-517d2.firebaseapp.com",
        projectId: "gold-savings-517d2",
        storageBucket: "gold-savings-517d2.firebasestorage.app",
        messagingSenderId: "1039204885436",
        appId: "1:1039204885436:web:046afe73cf7c98f556c1b9",
        measurementId: "G-H6H6GL3NW6"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = 'gold-savings-517d2';

    // --- STATE ---
    let currentUser = null;
    let userData = null;
    let settings = { shopName: "ออมทอง", shopTagline: "ออมทองออนไลน์ ปลอดภัย 100%", buyPrice: 42000, sellPrice: 42500, tgChatId: "", bankName: "กสิกรไทย", accountName: "ออมทอง จำกัด", accountNumber: "123-4-5678-9", pinCode: "1234" };
    let transactions = [];
    let allUsers = [];
    let activePage = 'home';
    let loginMode = 'login';
    let liveGold = null;
    let pinInput = "";
    let pinCb = null;

    // --- AUTH INIT ---
    const startAuth = async () => {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token);
        } else {
            await signInAnonymously(auth);
        }
    };
    startAuth();

    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        if (user) setupRealtime();
        else updateView();
    });

    // --- DATA SYNC ---
    function setupRealtime() {
        onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings'), (s) => {
            if (s.exists()) { settings = s.data(); updateStaticUI(); }
            else { setDoc(s.ref, settings); }
        });

        onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'users', currentUser.uid), (u) => {
            if (u.exists()) { userData = u.data(); updateView(); }
        });

        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'transactions'), (snap) => {
            transactions = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderPage();
        });

        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'users'), (snap) => {
            allUsers = snap.docs.map(d => d.data());
        });
    }

    // --- TELEGRAM ---
    async function notifyTG(text) {
        if (!settings.tgChatId) return;
        const botToken = "8731749401:AAEmA6wiK5o4NM0CcjJnmgt_827PbyMtPYw";
        try {
            await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ chat_id: settings.tgChatId, text, parse_mode: 'HTML' })
            });
        } catch(e) {}
    }

    // --- LIVE GOLD ---
    async function fetchGold() {
        try {
            const r = await fetch('https://gold-api.com/price/XAU');
            const d = await r.json();
            const fx = await (await fetch('https://open.er-api.com/v6/latest/USD')).json();
            const spot = d.price_gram_24k * fx.rates.THB;
            liveGold = { buy: Math.round(spot * 0.98), sell: Math.round(spot * 1.02), time: new Date().toLocaleTimeString('th-TH') };
            renderPage();
        } catch(e) {}
    }
    fetchGold();
    setInterval(fetchGold, 300000);

    // --- AUTH ACTIONS ---
    window.setLoginMode = (mode) => {
        loginMode = mode;
        document.getElementById('tab-login').classList.toggle('active', mode === 'login');
        document.getElementById('tab-register').classList.toggle('active', mode === 'register');
        document.getElementById('reg-fields').style.display = mode === 'register' ? 'block' : 'none';
    };

    window.handleAuth = async () => {
        const phone = document.getElementById('auth-phone').value;
        const pass = document.getElementById('auth-pass').value;
        if (!phone || !pass) return toast("กรุณากรอกข้อมูลให้ครบ", "error");

        if (loginMode === 'register') {
            const name = document.getElementById('auth-name').value;
            if (!name) return toast("กรุณากรอกชื่อ", "error");
            
            // Check if this is the first user
            const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'users');
            const snap = await getDocs(usersRef);
            const isFirst = snap.empty;

            const newUser = { uid: currentUser.uid, phone, pass, name, balanceTHB: 0, balanceGold: 0, role: isFirst ? 'admin' : 'customer' };
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', currentUser.uid), newUser);
            
            notifyTG(`🆕 <b>สมาชิกใหม่</b>\nชื่อ: ${name}\nเบอร์: ${phone}\nสิทธิ์: ${newUser.role}`);
            toast(isFirst ? "คุณคือแอดมินคนแรกของระบบ!" : "ลงทะเบียนสำเร็จ");
        } else {
            const target = allUsers.find(u => u.phone === phone && u.pass === pass);
            if (target) {
                if (target.uid !== currentUser.uid) {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', currentUser.uid), target);
                }
                toast("ยินดีต้อนรับกลับ");
            } else {
                toast("ข้อมูลไม่ถูกต้อง", "error");
            }
        }
    };

    window.logout = () => { auth.signOut(); location.reload(); };

    function updateView() {
        if (userData) {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('app-layout').style.display = 'flex';
            document.getElementById('display-user-name').innerText = userData.name;
            renderPage(); renderNav();
        } else {
            document.getElementById('login-page').style.display = 'flex';
            document.getElementById('app-layout').style.display = 'none';
        }
    }

    function renderNav() {
        const nav = document.getElementById('bottom-navigation');
        const items = [
            { id: 'home', label: 'หน้าแรก', icon: 'M3 12l9-9 9 9' },
            { id: 'history', label: 'ประวัติ', icon: 'M12 8v4l3 3' },
            { id: 'admin', label: 'จัดการ', icon: 'M12 15a3 3 0 100-6 3 3 0 000 6z', adminOnly: true },
            { id: 'profile', label: 'โปรไฟล์', icon: 'M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2' }
        ];
        nav.innerHTML = items.filter(i => !i.adminOnly || userData.role === 'admin').map(i => `
            <div class="nav-item ${activePage === i.id ? 'active' : ''}" onclick="navigate('${i.id}')">
                <svg style="width:24px;height:24px;" viewBox="0 0 24 24" stroke="currentColor" fill="none"><path d="${i.icon}" stroke-width="2"/></svg>
                <span>${i.label}</span>
            </div>
        `).join('');
    }

    window.navigate = (p) => {
        if (p === 'admin' && userData.role !== 'admin') {
            openPinLock(() => { activePage = p; renderPage(); renderNav(); });
            return;
        }
        activePage = p; renderPage(); renderNav();
    };

    // --- RENDERING ---
    function renderPage() {
        const c = document.getElementById('view-container');
        if (activePage === 'home') renderHome(c);
        else if (activePage === 'history') renderHistory(c);
        else if (activePage === 'admin') renderAdmin(c);
        else if (activePage === 'profile') renderProfile(c);
    }

    function renderHome(el) {
        const p = liveGold || settings;
        el.innerHTML = `
            <div class="price-ticker">
                <div style="font-size:0.7rem; color:rgba(255,215,0,0.8); margin-bottom:5px; display:flex; justify-content:space-between;">
                    <span>📈 ทอง 96.5% ${liveGold?'(สด)':'(แอดมิน)'}</span>
                    <span>${p.time || ''}</span>
                </div>
                <div style="display:flex; justify-content:space-between;">
                    <div><small style="opacity:0.6;">รับซื้อ/ก.</small><div class="price-val">฿${p.buy.toLocaleString()}</div></div>
                    <div style="width:1px; height:30px; background:rgba(255,255,255,0.1);"></div>
                    <div><small style="opacity:0.6;">ขายออก/ก.</small><div class="price-val">฿${p.sell.toLocaleString()}</div></div>
                </div>
            </div>
            
            <div class="wallet-card">
                <div style="font-size:0.8rem; opacity:0.8; margin-bottom:5px;">เงินสะสมปัจจุบัน</div>
                <div class="wallet-balance">฿ ${userData.balanceTHB.toLocaleString()}</div>
                <div style="margin-top:15px; border-top:1px solid rgba(255,255,255,0.1); padding-top:10px; display:flex; justify-content:space-between; align-items:flex-end;">
                    <div><small style="opacity:0.7;">ทองสะสม</small><div style="font-weight:700; color:var(--gold-bright);">${userData.balanceGold.toFixed(4)} กรัม</div></div>
                    <button class="btn btn-outline" style="width:auto; height:36px; padding:0 12px; font-size:0.8rem; color:white; border-color:white;" onclick="openDeposit()">แจ้งออมเงิน</button>
                </div>
            </div>

            <div class="chart-wrap">
                <div style="font-size:0.85rem; font-weight:700; color:var(--red);">ยอดออมสะสมรายเดือน</div>
                <div class="chart-bars">${[20,50,40,70,60,100].map(h => `<div class="chart-bar" style="height:${h}%"></div>`).join('')}</div>
            </div>

            <div class="action-grid">
                <div class="action-btn" onclick="openDeposit()"><div class="action-icon green">💰</div><div style="font-size:0.85rem; font-weight:600;">ออมเงิน</div></div>
                <div class="action-btn" onclick="toast('กรุณาติดต่อไลน์แอดมินเพื่อถอนทอง','warning')"><div class="action-icon red">🏆</div><div style="font-size:0.85rem; font-weight:600;">ถอนทอง</div></div>
            </div>
        `;
    }

    function renderHistory(el) {
        const txs = transactions.filter(t => t.userId === user.uid).reverse();
        el.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                <h3 style="color:var(--red);">ประวัติออมทอง</h3>
                <button class="btn btn-pdf" style="width:auto; padding:6px 12px; font-size:0.7rem;" onclick="printPDF()">ออก PDF</button>
            </div>
            ${txs.map(t => `
                <div class="tx-item">
                    <div><b>${t.note || 'แจ้งฝากเงิน'}</b><br><small>${new Date(t.date).toLocaleString()}</small></div>
                    <div style="text-align:right;">
                        <b style="color:var(--red);">฿${t.amount.toLocaleString()}</b><br>
                        <span style="font-size:0.7rem; color:${t.status==='approved'?'var(--success)':'var(--warning)'}">${t.status==='approved'?'สำเร็จ':'รอยืนยัน'}</span>
                    </div>
                </div>
            `).join('') || '<p style="text-align:center; opacity:0.5;">ไม่มีประวัติ</p>'}
        `;
    }

    function renderAdmin(el) {
        const pending = transactions.filter(t => t.status === 'pending');
        el.innerHTML = `
            <h3 style="color:var(--red); margin-bottom:1rem;">Dashboard แอดมิน</h3>
            <div style="background:white; border:1px solid var(--border); padding:1rem; border-radius:1rem; margin-bottom:1.5rem;">
                <div style="font-weight:700; margin-bottom:10px;">ตั้งค่าราคาทองหน้าเว็ป</div>
                <div style="display:flex; gap:8px;">
                    <input type="number" id="sbuy" class="form-input" style="margin:0;" value="${settings.buyPrice}" placeholder="ซื้อเข้า">
                    <input type="number" id="ssell" class="form-input" style="margin:0;" value="${settings.sellPrice}" placeholder="ขายออก">
                </div>
                <button class="btn btn-primary" style="margin-top:10px;" onclick="saveAdminSettings()">บันทึกราคา</button>
            </div>
            <h4>รอยืนยัน (${pending.length})</h4>
            ${pending.map(t => {
                const u = allUsers.find(x => x.uid === t.userId);
                return `
                    <div class="tx-item" style="flex-direction:column; align-items:flex-start; gap:10px;">
                        <div style="display:flex; justify-content:space-between; width:100%;">
                            <div><b>${u?.name || 'Unknown'}</b><br><small>เบอร์: ${u?.phone}</small></div>
                            <b style="color:var(--red);">฿${t.amount.toLocaleString()}</b>
                        </div>
                        <div style="display:flex; gap:8px; width:100%;">
                            <button class="btn btn-success" style="padding:6px; font-size:0.8rem;" onclick="approve('${t.id}')">อนุมัติ</button>
                            <button class="btn btn-outline" style="padding:6px; font-size:0.8rem; border-color:var(--error); color:var(--error);" onclick="reject('${t.id}')">ปฏิเสธ</button>
                        </div>
                    </div>
                `;
            }).join('') || '<p style="text-align:center; padding:20px; opacity:0.5;">ไม่มีรายการรอนุมัติ</p>'}
            <button class="btn btn-outline" style="margin-top:1rem; border-color:var(--success); color:var(--success);" onclick="exportCSV()">โหลด Excel สรุปรวม</button>
        `;
    }

    function renderProfile(el) {
        el.innerHTML = `
            <div style="text-align:center; padding:20px 0;">
                <div style="width:70px; height:70px; background:var(--red); color:white; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:1.8rem; font-weight:700; margin-bottom:10px; border:2px solid var(--gold);">${userData.name[0]}</div>
                <h2 style="color:var(--red);">${userData.name}</h2>
                <div style="background:var(--red-dark); color:white; display:inline-block; padding:2px 12px; border-radius:20px; font-size:0.75rem;">${userData.role.toUpperCase()}</div>
            </div>
            <div class="tx-item"><span>เบอร์โทรศัพท์</span><b>${userData.phone}</b></div>
            <div class="tx-item"><span>เงินสะสม</span><b style="color:var(--success);">฿${userData.balanceTHB.toLocaleString()}</b></div>
            <div class="tx-item"><span>ทองสะสม</span><b style="color:var(--gold);">${userData.balanceGold.toFixed(4)} ก.</b></div>
            <button class="btn btn-outline" style="margin-top:2rem; color:var(--error); border-color:var(--error);" onclick="logout()">ออกจากระบบ</button>
        `;
    }

    // --- LOGIC ---
    window.openDeposit = () => {
        const modal = document.getElementById('modal-content');
        modal.innerHTML = `
            <h3 style="color:var(--red); margin-bottom:1rem;">แจ้งโอนเงิน</h3>
            <div style="background:var(--surface2); border:1.5px dashed var(--gold); padding:1rem; border-radius:1rem; text-align:center; margin-bottom:1.5rem;">
                <small>โอนเข้า: ${settings.bankName}</small>
                <div style="font-size:1.4rem; font-weight:800; color:var(--red); margin:4px 0;">${settings.accountNumber}</div>
                <div style="font-weight:600;">${settings.accountName}</div>
            </div>
            <input type="number" id="damt" class="form-input" placeholder="จำนวนเงิน">
            <input type="text" id="dnote" class="form-input" placeholder="หมายเหตุ (เวลาที่โอน)">
            <button class="btn btn-primary" onclick="submitDeposit()">แจ้งฝากออม</button>
        `;
        document.getElementById('modal-overlay').style.display = 'flex';
    };

    window.submitDeposit = async () => {
        const amt = parseFloat(document.getElementById('damt').value);
        const note = document.getElementById('dnote').value;
        if (!amt) return toast("กรุณากรอกเงิน", "error");
        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'transactions'), { userId: user.uid, amount: amt, note, status: 'pending', date: new Date().toISOString() });
        notifyTG(`💰 <b>แจ้งฝากใหม่</b>\nชื่อ: ${userData.name}\nยอด: ฿${amt.toLocaleString()}\nหมายเหตุ: ${note}`);
        toast("แจ้งข้อมูลแล้ว รอตรวจสอบ");
        closeModal();
    };

    window.approve = async (id) => {
        const tx = transactions.find(t => t.id === id);
        const uRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', tx.userId);
        const u = (await getDoc(uRef)).data();
        const goldWeight = tx.amount / settings.sellPrice;
        await updateDoc(uRef, { balanceTHB: u.balanceTHB + tx.amount, balanceGold: u.balanceGold + goldWeight });
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'transactions', id), { status: 'approved' });
        toast("อนุมัติสำเร็จ!");
    };

    window.saveAdminSettings = async () => {
        const b = parseFloat(document.getElementById('sbuy').value);
        const s = parseFloat(document.getElementById('ssell').value);
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings'), { buyPrice: b, sellPrice: s });
        toast("บันทึกราคาทองแล้ว");
    };

    // --- PIN LOCK ---
    window.openPinLock = (cb) => {
        pinInput = ""; pinCb = cb;
        document.getElementById('pin-lock-overlay').style.display = 'flex';
        const ui = document.getElementById('pin-pad-ui');
        ui.innerHTML = [1,2,3,4,5,6,7,8,9,'C',0,'OK'].map(k => `<div class="pin-key" onclick="pressPin('${k}')">${k}</div>`).join('');
        updateDots();
    };
    window.closePinLock = () => { document.getElementById('pin-lock-overlay').style.display = 'none'; };
    window.pressPin = (k) => {
        if (k === 'C') pinInput = "";
        else if (k === 'OK') {
            if (pinInput === settings.pinCode) { closePinLock(); pinCb(); }
            else { toast("รหัส PIN ไม่ถูกต้อง", "error"); pinInput = ""; }
        } else if (pinInput.length < 4) {
            pinInput += k;
            if (pinInput.length === 4) setTimeout(() => pressPin('OK'), 200);
        }
        updateDots();
    };
    function updateDots() { for(let i=0; i<4; i++) document.getElementById(`pdot${i}`).classList.toggle('filled', i < pinInput.length); }

    // --- EXPORTS ---
    window.printPDF = () => {
        const area = document.getElementById('print-area');
        area.innerHTML = `
            <div style="padding:40px; font-family:'Prompt';">
                <h1 style="color:var(--red); border-bottom:2px solid var(--gold);">${settings.shopName} - รายงาน</h1>
                <p>ชื่อลูกค้า: ${userData.name}</p>
                <p>ยอดเงินสะสม: ฿${userData.balanceTHB.toLocaleString()}</p>
                <p>ยอดทองสะสม: ${userData.balanceGold.toFixed(4)} กรัม</p>
            </div>
        `;
        window.print();
    };

    window.exportCSV = () => {
        const rows = [["ชื่อ", "เงิน", "ทอง"]];
        allUsers.forEach(u => rows.push([u.name, u.balanceTHB, u.balanceGold]));
        const csv = "\ufeff" + rows.map(r => r.join(",")).join("\n");
        const b = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const l = document.createElement("a");
        l.href = URL.createObjectURL(b); l.download = `รายงานรวม.csv`; l.click();
    };

    // --- UTILS ---
    window.toast = (m, t='success') => {
        const el = document.getElementById('notification');
        el.innerText = m; el.style.display = 'block';
        el.style.background = t === 'success' ? 'var(--success)' : 'var(--error)';
        setTimeout(() => el.style.display = 'none', 3000);
    };
    window.closeModal = () => document.getElementById('modal-overlay').style.display = 'none';
    function updateStaticUI() {
        document.getElementById('shop-title-disp').innerText = settings.shopName;
        document.getElementById('shop-tag-disp').innerText = settings.shopTagline;
        document.getElementById('nav-shop-name').innerText = settings.shopName;
    }
</script>
</body>
</html>
